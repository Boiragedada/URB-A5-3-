<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Login</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100 flex items-center justify-center h-screen">

<div class="bg-white p-8 w-96 rounded-lg shadow">

<div class="text-center">

<img src="https://github.githubassets.com/images/modules/logos_page/GitHub-Mark.png" class="w-16 mx-auto">

<h2 class="text-2xl font-bold mt-2">GitHub Issues Tracker</h2>

<p class="text-gray-500">Sign in to manage your issues</p>

</div>

<div class="mt-6">

<label>Username</label>
<input id="username" class="border w-full p-2 rounded mt-1" placeholder="Enter Username">

<!-- <p class="text-blue-500 text-sm">Default: admin</p> -->

</div>

<div class="mt-4">

<label>Password</label>
<input id="password" type="password" class="border w-full p-2 rounded mt-1" placeholder="Enter Password">

<!-- <p class="text-blue-500 text-sm">Default: admin123</p> -->

</div>

<button onclick="login()" class="w-full mt-6 bg-purple-600 text-white py-2 rounded">
Sign In
</button>

</div>

<script>

function login(){

const username=document.getElementById("username").value
const password=document.getElementById("password").value

if(username==="admin" && password==="admin123"){

window.location.href="index.html"

}else{

alert("Invalid password")

}

}

</script>

</body>
</html>
