<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>GitHub Issues Tracker</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
/* Smooth modal animation */
#modal {
  opacity: 0;
  transform: scale(0.9);
  transition: all 0.3s ease-in-out;
}
#modal.show {
  opacity: 1;
  transform: scale(1);
}
</style>
</head>
<body class="bg-gray-100">

<!-- Navbar -->
<div class="bg-white shadow flex justify-between items-center p-4">
  <h1 class="font-bold text-lg">GitHub Issues Tracker</h1>
  <div class="flex gap-2">
    <input id="searchInput" class="border p-2 rounded focus:ring-2 focus:ring-purple-500" placeholder="Search issues">
    <button onclick="searchIssue()" class="bg-purple-600 text-white px-4 py-2 rounded hover:bg-purple-700 transition">Search</button>
  </div>
</div>

<!-- Tabs + Issue Count -->
<div class="max-w-6xl mx-auto mt-6">
  <div class="flex gap-2 mb-4">
    <button id="allTab" onclick="loadIssues()" class="tab bg-purple-600 text-white px-4 py-2 rounded hover:shadow">All</button>
    <button id="openTab" onclick="filterStatus('open')" class="tab bg-gray-200 px-4 py-2 rounded hover:shadow">Open</button>
    <button id="closedTab" onclick="filterStatus('closed')" class="tab bg-gray-200 px-4 py-2 rounded hover:shadow">Closed</button>
  </div>

  <div class="flex justify-between items-center mb-4">
    <div id="issueCount" class="text-gray-700 font-semibold">Total Issues: 0</div>
  </div>

  <!-- Loader -->
  <div id="loader" class="text-center hidden text-lg mt-10">Loading...</div>

  <!-- Issues Grid -->
  <div id="issues-container" class="grid lg:grid-cols-4 md:grid-cols-2 sm:grid-cols-1 gap-4"></div>
</div>

<!-- Modal -->
<div id="modal" class="fixed inset-0 bg-black bg-opacity-50 hidden items-center justify-center z-50">
  <div class="bg-white p-6 rounded-xl w-11/12 md:w-96 shadow-2xl relative">
    
    <!-- Modal Header -->
    <h2 id="modalTitle" class="text-xl font-bold mb-2"></h2>

    <!-- Open Button below H2 -->
    <div class="flex justify-start mb-2">
      <button class="bg-green-100 text-green-700 px-3 py-1 rounded text-xs hover:bg-green-200 transition">OPEN</button>
    </div>

    <!-- Modal Content -->
    <div class="mb-4 text-gray-700 text-sm">
      <p id="modalDesc" class="mb-2"></p>
      <p id="modalAuthor" class="mb-1"></p>
      <p id="modalPriority" class="mb-1"></p>
      <p id="modalLabel" class="mb-1"></p>
    </div>

    <!-- Modal Buttons -->
    <div class="flex gap-2 mt-4 mb-4">
      <button class="bg-red-100 text-red-600 px-3 py-1 rounded flex items-center gap-1 hover:bg-red-200 transition">
         BUG
      </button>
      <button class="bg-purple-100 text-purple-600 px-3 py-1 rounded flex items-center gap-1 hover:bg-purple-200 transition">
         HELP WANTED
      </button>
    </div>

    <!-- Close button bottom right -->
    <div class="flex justify-end">
      <button onclick="closeModal()" class="bg-purple-600 text-white px-4 py-2 rounded hover:bg-purple-700 transition">Close</button>
    </div>
  </div>
</div>

<script src="main.js"></script>

</body>
</html>
